services:
  app:
    image: ghcr.io/minuring/final-mission:latest
    container_name: app
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=local
      - SPRING_H2_CONSOLE_ENABLED=true
      - SPRING_H2_CONSOLE_SETTINGS_WEB-ALLOW-OTHERS=true
      - HOLIDAY_API_URL=${HOLIDAY_API_URL}
      - HOLIDAY_API_KEY=${HOLIDAY_API_KEY}
