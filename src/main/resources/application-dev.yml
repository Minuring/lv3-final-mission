spring:
  sql:
    init:
      mode: always
  datasource:
    url: jdbc:h2:mem:gymbook
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: validate
    defer-datasource-initialization: true

api:
  get-holiday:
    base-url: ${HOLIDAY_API_URL}
    service-key: ${HOLIDAY_API_KEY}
