name: Deploy on Develop Merge

on:
  push:
    branches: [ "develop" ]
  pull_request:
    branches: [ "develop" ]

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ secrets.REGISTRY_USERNAME }}/final-mission:latest
            ghcr.io/${{ secrets.REGISTRY_USERNAME }}/final-mission:${{ github.sha }}

  deploy:
    name: Deploy with Docker Compose
    runs-on: self-hosted
    needs: build-and-push

    steps:
      - name: Log in to GHCR
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ secrets.REGISTRY_USERNAME }} --password-stdin

      - name: Pull latest image
        run: docker pull ghcr.io/${{ secrets.REGISTRY_USERNAME }}/final-mission:latest

      - name: Docker Compose Up
        run: docker compose up -d
