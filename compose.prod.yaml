services:
  app:
    image: ghcr.io/minuring/final-mission:latest
    container_name: app
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - HOLIDAY_API_URL=${HOLIDAY_API_URL}
      - HOLIDAY_API_KEY=${HOLIDAY_API_KEY}
      - DB_URL=${DB_URL}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
